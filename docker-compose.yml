version: '3.8'

services:
  biomas-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biomas-analyzer
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - DEBUG=false
      - PYTHONUNBUFFERED=1
      - PORT=5000
    volumes:
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
      - ./templates:/app/templates
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
